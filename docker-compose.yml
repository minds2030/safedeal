version: '3.9'

services:

  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       safedeal
      POSTGRES_USER:     safedeal_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safedeal_user -d safedeal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Telegram Bot ──────────────────────────────────────────
  bot:
    build: .
    restart: always
    command: python main.py
    environment:
      DATABASE_URL: postgresql+asyncpg://safedeal_user:${DB_PASSWORD}@db/safedeal
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  # ── FastAPI Backend ───────────────────────────────────────
  api:
    build: .
    restart: always
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://safedeal_user:${DB_PASSWORD}@db/safedeal
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api

  # ── SSL Certificate ───────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email ${ADMIN_EMAIL} --agree-tos --no-eff-email
             -d ${DOMAIN}

volumes:
  postgres_data:
